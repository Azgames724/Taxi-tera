<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaxiFinder Ethiopia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#181818;--bg2:#222;--bg3:#2a2a2a;--card:#252525;--border:rgba(255,255,255,0.07);--y:#F6C231;--y2:#E5AE20;--ydim:rgba(246,194,49,0.12);--yglow:rgba(246,194,49,0.28);--text:#FFF;--t2:#A0A0A0;--t3:#606060;--green:#22C55E;--red:#EF4444;--orange:#F97316;--blue:#60A5FA;--sh:0 8px 32px rgba(0,0,0,0.55);--sh-sm:0 2px 12px rgba(0,0,0,0.35)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#map{position:fixed;inset:0;z-index:0}
.leaflet-container{background:#111!important}
.leaflet-tile{filter:brightness(0.28) saturate(0.15)!important}
.leaflet-control-zoom{display:none}
.leaflet-popup-content-wrapper{background:var(--card)!important;border-radius:14px!important;border:1px solid rgba(246,194,49,0.2)!important;box-shadow:0 16px 48px rgba(0,0,0,0.8)!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip{background:var(--card)!important}
.leaflet-popup-close-button{color:#666!important;top:10px!important;right:10px!important;font-size:18px!important}
.topbar{position:fixed;top:0;left:0;right:0;z-index:500;padding:14px 20px 20px;display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,rgba(24,24,24,1) 50%,transparent);pointer-events:none}
.topbar>*{pointer-events:auto}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;background:var(--y);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 18px var(--yglow);flex-shrink:0}
.logo-name{font-size:18px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.logo-name em{color:var(--y);font-style:normal}
.logo-sub{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:1.2px;text-transform:uppercase}
.city-btn{margin-left:auto;display:flex;align-items:center;gap:7px;background:rgba(37,37,37,0.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:24px;padding:8px 14px;cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;color:var(--t2)}
.city-btn:hover{border-color:var(--y);color:var(--y)}
.city-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
.map-ctrls{position:fixed;right:16px;z-index:400;display:flex;flex-direction:column;gap:8px}
.mc{width:44px;height:44px;background:rgba(37,37,37,0.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .2s;box-shadow:var(--sh-sm)}
.mc:hover{border-color:var(--y);color:var(--y)}
.fab{position:fixed;right:16px;z-index:400;width:52px;height:52px;border-radius:16px;background:var(--y);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px var(--yglow);transition:all .25s}
.fab:hover{background:var(--y2);transform:scale(1.05)}
.fab.pinging{animation:fabP .7s ease-out infinite alternate}
@keyframes fabP{0%{box-shadow:0 6px 24px var(--yglow)}100%{box-shadow:0 6px 40px rgba(246,194,49,0.6)}}
.map-stats{position:fixed;left:16px;z-index:400;display:flex;flex-direction:column;gap:8px;transition:opacity .35s}
.ms-chip{background:rgba(37,37,37,0.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh-sm)}
.ms-val{font-size:16px;font-weight:800;color:var(--y)}
.ms-lbl{font-size:10px;color:var(--t3);letter-spacing:.5px}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);display:flex;flex-direction:column;box-shadow:0 -8px 48px rgba(0,0,0,0.65);max-height:72vh}
.sheet-handle{width:40px;height:4px;background:var(--bg3);border-radius:4px;margin:12px auto 0;flex-shrink:0}
.s-wrap{padding:14px 16px 0;flex-shrink:0}
.s-row{display:flex;gap:10px;align-items:center}
.s-box{flex:1;display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:11px 14px;transition:all .2s}
.s-box:focus-within{border-color:var(--y);box-shadow:0 0 0 3px var(--ydim)}
.s-box input{background:none;border:none;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);width:100%}
.s-box input::placeholder{color:var(--t3)}
.s-ico{color:var(--t3);flex-shrink:0}
.f-btn{width:46px;height:46px;flex-shrink:0;border-radius:14px;background:var(--y);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px var(--yglow);transition:all .2s}
.f-btn:hover{background:var(--y2)}
.tabs{display:flex;gap:7px;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:5px;white-space:nowrap;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .2s;flex-shrink:0}
.tab:hover{border-color:rgba(246,194,49,.4);color:var(--y)}
.tab.active{background:var(--y);border-color:var(--y);color:#181818}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;flex-shrink:0}
.sbar-l{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sdot.live{background:var(--green);box-shadow:0 0 7px var(--green)}
.sdot.locating{background:var(--y);animation:blk 1s infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.3}}
.rc{font-size:12px;color:var(--t3)}.rc b{color:var(--y)}
.list{overflow-y:auto;flex:1;padding:0 16px 24px}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
.si{display:flex;align-items:center;gap:13px;padding:13px;border-radius:16px;border:1px solid var(--border);background:var(--card);margin-bottom:9px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.si::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:var(--y);transition:width .2s;border-radius:0 3px 3px 0}
.si:hover{border-color:rgba(246,194,49,.35);background:#2c2c2c;transform:translateX(2px)}
.si.act{border-color:var(--y);background:rgba(246,194,49,.06)}
.si.act::before{width:3px}
.si-ico{width:46px;height:46px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.si-body{flex:1;min-width:0}
.si-n{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.si-a{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-tags{display:flex;align-items:center;gap:5px;margin-top:6px}
.stag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
.stag.open{background:rgba(34,197,94,.1);color:var(--green)}
.stag.busy{background:rgba(249,115,22,.1);color:var(--orange)}
.stag.typ{background:var(--bg3);color:var(--t3)}
.si-r{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0}
.si-d{font-size:15px;font-weight:800;color:var(--y)}
.si-w{font-size:10px;color:var(--t3)}
.go-btn{width:32px;height:32px;border-radius:10px;background:var(--y);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.go-btn:hover{background:var(--y2);transform:scale(1.08)}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.ei{font-size:42px;margin-bottom:12px;opacity:.4}
.et{font-size:13px;line-height:1.8}
.dp{position:fixed;bottom:0;left:0;right:0;z-index:600;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding-bottom:32px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 60px rgba(0,0,0,0.75);max-height:68vh;overflow-y:auto}
.dp.open{transform:translateY(0)}
.dp::-webkit-scrollbar{width:3px}
.dp::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
.dp-h{width:40px;height:4px;background:var(--bg3);border-radius:4px;margin:12px auto 0}
.dp-head{display:flex;align-items:flex-start;gap:16px;padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.dp-ico{width:56px;height:56px;border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.dp-inf{flex:1}
.dp-name{font-size:18px;font-weight:800;margin-bottom:4px}
.dp-area{font-size:13px;color:var(--t3)}
.dp-x{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;transition:all .2s}
.dp-x:hover{border-color:var(--red);color:var(--red)}
.dp-met{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 20px}
.dm{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center}
.dm-v{font-size:20px;font-weight:800}
.dm-v.y{color:var(--y)}.dm-v.g{color:var(--green)}.dm-v.b{color:var(--blue)}
.dm-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;font-weight:600}
.dp-sec{padding:0 20px 16px}
.dp-stitle{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px}
.rchips{display:flex;flex-wrap:wrap;gap:7px}
.rchip{font-size:12px;color:var(--text);background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-weight:500}
.dp-acts{display:flex;gap:10px;padding:0 20px}
.dp-nav{flex:1;padding:15px;border-radius:16px;border:none;background:var(--y);color:#181818;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 6px 24px var(--yglow)}
.dp-nav:hover{background:var(--y2);transform:translateY(-1px)}
.dp-sh{width:52px;height:52px;flex-shrink:0;border-radius:16px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .2s}
.dp-sh:hover{border-color:var(--y);color:var(--y)}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) scale(.92);background:var(--card);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500;padding:11px 18px;border-radius:24px;box-shadow:var(--sh);z-index:1000;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;opacity:0;display:flex;align-items:center;gap:8px;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) scale(1)}
.td{width:7px;height:7px;border-radius:50%;background:var(--y);flex-shrink:0}
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar">
  <div class="logo-wrap">
    <div class="logo-icon">🚕</div>
    <div><div class="logo-name">Taxi<em>Finder</em></div><div class="logo-sub">Ethiopia</div></div>
  </div>
  <div class="city-btn" onclick="showToast('🌍 More cities coming soon')">
    <div class="city-dot"></div><span>Addis Ababa</span>
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
</div>
<div class="map-stats" id="mapStats" style="opacity:0;pointer-events:none;top:80px">
  <div class="ms-chip"><span style="font-size:16px">📍</span><div><div class="ms-val" id="msN">0</div><div class="ms-lbl">Nearby</div></div></div>
  <div class="ms-chip"><span style="font-size:16px">🏃</span><div><div class="ms-val" id="msC">—</div><div class="ms-lbl">Closest</div></div></div>
</div>
<div class="map-ctrls" style="top:calc(50% - 52px)">
  <div class="mc" onclick="resetView()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></div>
  <div class="mc" onclick="toggleLayer()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
</div>
<button class="fab" id="fab" style="bottom:calc(72vh + 16px)" onclick="locateUser()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#181818" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="7"/></svg>
</button>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="s-wrap">
    <div class="s-row">
      <div class="s-box">
        <svg class="s-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="si" placeholder="Search stations, routes, areas…" oninput="applyF()"/>
      </div>
      <button class="f-btn" onclick="cycleSort()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#181818" stroke-width="2.5"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="9" y1="18" x2="3" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setT('all',this)">All Stations</div>
    <div class="tab" onclick="setT('minibus',this)">🚐 Minibus</div>
    <div class="tab" onclick="setT('contract',this)">🚕 Contract</div>
    <div class="tab" onclick="setT('shared',this)">🚌 Shared</div>
  </div>
  <div class="sbar">
    <div class="sbar-l"><div class="sdot" id="sdot"></div><span id="stxt">Tap locate to find your position</span></div>
    <div class="rc"><b id="rc">15</b> stations</div>
  </div>
  <div class="list" id="list"></div>
</div>
<div class="dp" id="dp">
  <div class="dp-h"></div>
  <div class="dp-head">
    <div class="dp-ico" id="dpIco"></div>
    <div class="dp-inf"><div class="dp-name" id="dpN"></div><div class="dp-area" id="dpA"></div></div>
    <div class="dp-x" onclick="closeDP()">x</div>
  </div>
  <div class="dp-met">
    <div class="dm"><div class="dm-v y" id="dpD">—</div><div class="dm-l">Distance</div></div>
    <div class="dm"><div class="dm-v g" id="dpW">—</div><div class="dm-l">Walk</div></div>
    <div class="dm"><div class="dm-v b" id="dpS">—</div><div class="dm-l">Activity</div></div>
  </div>
  <div class="dp-sec"><div class="dp-stitle">Served Routes</div><div class="rchips" id="dpR"></div></div>
  <div class="dp-acts">
    <button class="dp-nav" id="dpBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#181818" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      Navigate Now
    </button>
    <div class="dp-sh" onclick="shareS()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </div>
  </div>
</div>
<div class="toast" id="toast"><div class="td"></div><span id="tm"></span></div>
<script>
const DATA=[
  {id:1,name:"Merkato Terminal",area:"Merkato, Addis Ababa",lat:9.0347,lng:38.7396,type:"minibus",e:"🚐",s:"busy",r:["Megenagna","Piazza","Bole","Gerji","Stadium"]},
  {id:2,name:"Megenagna Hub",area:"Megenagna, Addis Ababa",lat:9.0227,lng:38.7815,type:"minibus",e:"🚐",s:"open",r:["CMC","Ayat","Stadium","Piazza","Mexico"]},
  {id:3,name:"Bole Airport Taxis",area:"Bole International Airport",lat:8.9764,lng:38.7956,type:"contract",e:"🚕",s:"open",r:["Airport Transfers","Hotel Drops","CBD"]},
  {id:4,name:"Piazza Bus Station",area:"Piazza, Addis Ababa",lat:9.0450,lng:38.7431,type:"shared",e:"🚌",s:"open",r:["Merkato","Arat Kilo","Sidist Kilo"]},
  {id:5,name:"Stadium Taxi Hub",area:"Addis Ketema",lat:9.0276,lng:38.7519,type:"minibus",e:"🚐",s:"busy",r:["Kality","Akaki","Nefassilk","Gotera"]},
  {id:6,name:"CMC Mini-Bus Stop",area:"CMC, Addis Ababa",lat:9.0450,lng:38.7972,type:"minibus",e:"🚐",s:"open",r:["Megenagna","Ayat","Betel"]},
  {id:7,name:"Sarbet Minibus Hub",area:"Sarbet, Addis Ababa",lat:9.0040,lng:38.7627,type:"minibus",e:"🚐",s:"open",r:["Mexico","Tor Hailoch","Gofa"]},
  {id:8,name:"Arat Kilo Contract Taxi",area:"Arat Kilo, Addis Ababa",lat:9.0385,lng:38.7623,type:"contract",e:"🚕",s:"open",r:["Citywide","University Area"]},
  {id:9,name:"Gotera Interchange",area:"Gotera, Addis Ababa",lat:9.0068,lng:38.7531,type:"shared",e:"🚌",s:"busy",r:["Akaki","Kality","Megenagna","Bole"]},
  {id:10,name:"Mexico Square Taxi",area:"Mexico Square",lat:9.0204,lng:38.7494,type:"minibus",e:"🚐",s:"open",r:["Sarbet","Gofa","Megenagna"]},
  {id:11,name:"Kazanchis Taxi Stand",area:"Kazanchis, Addis Ababa",lat:9.0147,lng:38.7739,type:"contract",e:"🚕",s:"open",r:["Airport","Hotels","Bole Road"]},
  {id:12,name:"Gerji Station",area:"Gerji, Addis Ababa",lat:9.0039,lng:38.8043,type:"minibus",e:"🚐",s:"open",r:["Megenagna","Bole","Ayat"]},
  {id:13,name:"Tor Hailoch Hub",area:"Tor Hailoch, Addis Ababa",lat:8.9968,lng:38.7690,type:"shared",e:"🚌",s:"busy",r:["Akaki","Kality","Gotera"]},
  {id:14,name:"Sidist Kilo Stop",area:"Sidist Kilo, Addis Ababa",lat:9.0461,lng:38.7637,type:"minibus",e:"🚐",s:"open",r:["Arat Kilo","Piazza","Stadium"]},
  {id:15,name:"Bole Medhanialem",area:"Bole, Addis Ababa",lat:8.9924,lng:38.7912,type:"minibus",e:"🚐",s:"open",r:["Megenagna","Kazanchis","Mexico"]}
];
let map,userM,uCoords=null,aType='all',filtered=[...DATA],selId=null,markers={},sat=false,tile;
function mkColor(t){return t==='minibus'?'#F6C231':t==='contract'?'#60A5FA':'#22C55E'}
function mkBg(t){return t==='minibus'?'rgba(246,194,49,.12)':t==='contract'?'rgba(96,165,250,.12)':'rgba(34,197,94,.12)'}
function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([9.0192,38.7525],13);
  tile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  document.head.insertAdjacentHTML('beforeend','<style>@keyframes mR{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.7);opacity:0}}@keyframes uR{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.2);opacity:0}}</style>');
  renderMarkers();renderList();
}
function renderMarkers(){
  Object.values(markers).forEach(function(m){map.removeLayer(m)});markers={};
  filtered.forEach(function(s){
    var act=selId===s.id;var col=mkColor(s.type);
    var html='<div style="position:relative;width:40px;height:50px'+(act?';transform:scale(1.2);transform-origin:bottom center':'')+'">'+(act?'<div style="position:absolute;top:0;left:0;width:40px;height:40px;border-radius:50%;background:'+col+'22;animation:mR 1.5s ease-out infinite"></div>':'')+'<div style="width:40px;height:40px;background:'+col+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px '+col+'55;border:2px solid rgba(255,255,255,.18)"><span style="transform:rotate(45deg);font-size:18px">'+s.e+'</span></div></div>';
    var icon=L.divIcon({html:html,className:'',iconSize:[40,50],iconAnchor:[20,50],popupAnchor:[0,-52]});
    var m=L.marker([s.lat,s.lng],{icon:icon}).addTo(map);
    m.on('click',function(){openDP(s.id)});
    var popHtml='<div style="font-family:\'Plus Jakarta Sans\',sans-serif;padding:14px"><div style="font-weight:700;font-size:14px;color:#fff;margin-bottom:4px">'+s.name+'</div><div style="font-size:11px;color:#888;margin-bottom:10px">'+s.area+'</div><div style="display:flex;gap:6px;margin-bottom:10px"><span style="font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;background:'+(s.s==='busy'?'rgba(249,115,22,.12)':'rgba(34,197,94,.1)')+';color:'+(s.s==='busy'?'#F97316':'#22C55E')+'">'+(s.s==='busy'?'● Busy':'● Active')+'</span><span style="font-size:10px;padding:3px 8px;border-radius:6px;background:#2a2a2a;color:#888">'+s.type+'</span></div><button onclick="openDP('+s.id+')" style="width:100%;padding:9px;border-radius:10px;border:none;background:#F6C231;color:#181818;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:800;font-size:13px;cursor:pointer">View Details →</button></div>';
    m.bindPopup(popHtml);markers[s.id]=m;
  });
}
function locateUser(){
  var fab=document.getElementById('fab'),dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  fab.classList.add('pinging');dot.className='sdot locating';txt.textContent='Detecting your location…';showToast('🔍 Locating you…');
  if(!navigator.geolocation){showToast('⚠️ Geolocation not supported');fab.classList.remove('pinging');return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    fab.classList.remove('pinging');uCoords={lat:pos.coords.latitude,lng:pos.coords.longitude};
    dot.className='sdot live';txt.textContent='Location active';
    if(userM)map.removeLayer(userM);
    var uH='<div style="position:relative;width:22px;height:22px;display:flex;align-items:center;justify-content:center"><div style="position:absolute;inset:-10px;border-radius:50%;background:rgba(96,165,250,.15);animation:uR 2s ease-out infinite"></div><div style="width:22px;height:22px;background:#60A5FA;border-radius:50%;border:3px solid #fff;box-shadow:0 0 16px rgba(96,165,250,.7)"></div></div>';
    var uI=L.divIcon({html:uH,className:'',iconSize:[22,22],iconAnchor:[11,11]});
    userM=L.marker([uCoords.lat,uCoords.lng],{icon:uI,zIndexOffset:2000}).addTo(map);
    userM.bindPopup('<div style="font-family:\'Plus Jakarta Sans\',sans-serif;padding:10px 14px;color:#fff;font-size:13px;font-weight:700">📍 You are here</div>');
    map.flyTo([uCoords.lat,uCoords.lng],14,{duration:1.5});
    recalc();showToast('✅ Location found!');
    var ms=document.getElementById('mapStats');ms.style.opacity='1';ms.style.pointerEvents='auto';
  },function(err){
    fab.classList.remove('pinging');dot.className='sdot';
    var m={1:'Permission denied.',2:'Location unavailable.',3:'Request timed out.'};
    showToast('⚠️ '+(m[err.code]||'Failed'));txt.textContent='Location unavailable';
    uCoords={lat:9.0192,lng:38.7525};recalc();
    var ms=document.getElementById('mapStats');ms.style.opacity='1';ms.style.pointerEvents='auto';
  },{enableHighAccuracy:true,timeout:12000});
}
function hav(a,b,c,d){var R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);return 2*R*Math.asin(Math.sqrt(x))}
function recalc(){
  if(!uCoords)return;
  DATA.forEach(function(s){s.dm=Math.round(hav(uCoords.lat,uCoords.lng,s.lat,s.lng));s.dt=s.dm<1000?s.dm+'m':(s.dm/1000).toFixed(1)+'km';s.wm=Math.round(s.dm/83)});
  var so=[...DATA].sort(function(a,b){return a.dm-b.dm});
  document.getElementById('msN').textContent=so.filter(function(s){return s.dm<3000}).length;
  document.getElementById('msC').textContent=so[0]?so[0].dt:'—';applyF();
}
function setT(t,el){aType=t;document.querySelectorAll('.tab').forEach(function(c){c.classList.remove('active')});el.classList.add('active');applyF()}
function applyF(){
  var q=document.getElementById('si').value.toLowerCase();
  filtered=DATA.filter(function(s){var mt=aType==='all'||s.type===aType;var mq=!q||s.name.toLowerCase().indexOf(q)>-1||s.area.toLowerCase().indexOf(q)>-1||s.r.some(function(r){return r.toLowerCase().indexOf(q)>-1});return mt&&mq});
  if(uCoords)filtered.sort(function(a,b){return(a.dm||999999)-(b.dm||999999)});
  document.getElementById('rc').textContent=filtered.length;renderMarkers();renderList();
}
function cycleSort(){if(uCoords){applyF();showToast('⇅ Sorted by distance')}else showToast('📍 Enable location first')}
function renderList(){
  var el=document.getElementById('list');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="ei">🔍</div><div class="et">No stations match<br>your search</div></div>';return}
  el.innerHTML=filtered.map(function(s){
    var bg=mkBg(s.type),act=selId===s.id?'act':'';
    var dist=s.dt?'<div class="si-d">'+s.dt+'</div><div class="si-w">'+(s.wm?s.wm+'min walk':'')+'</div>':'';
    return '<div class="si '+act+'" onclick="openDP('+s.id+')"><div class="si-ico" style="background:'+bg+'">'+s.e+'</div><div class="si-body"><div class="si-n">'+s.name+'</div><div class="si-a">'+s.area+'</div><div class="si-tags"><span class="stag '+s.s+'">'+(s.s==='busy'?'● Busy':'● Active')+'</span><span class="stag typ">'+s.type+'</span></div></div><div class="si-r">'+dist+'<button class="go-btn" onclick="event.stopPropagation();navTo('+s.id+')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#181818" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></button></div></div>'
  }).join('');
}
function openDP(id){
  var s=DATA.find(function(x){return x.id===id});if(!s)return;selId=id;
  var bg=mkBg(s.type);
  document.getElementById('dpIco').innerHTML='<div style="width:56px;height:56px;border-radius:16px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:26px">'+s.e+'</div>';
  document.getElementById('dpN').textContent=s.name;document.getElementById('dpA').textContent=s.area;
  document.getElementById('dpD').textContent=s.dt||'N/A';document.getElementById('dpW').textContent=s.wm?s.wm+'m':'N/A';
  document.getElementById('dpS').textContent=s.s==='busy'?'Busy':'Active';
  document.getElementById('dpR').innerHTML=s.r.map(function(r){return'<span class="rchip">'+r+'</span>'}).join('');
  document.getElementById('dpBtn').onclick=function(){navTo(id)};
  document.getElementById('dp').classList.add('open');
  map.flyTo([s.lat,s.lng],15,{duration:1.2});renderMarkers();renderList();
}
function closeDP(){document.getElementById('dp').classList.remove('open');selId=null;renderMarkers();renderList()}
function navTo(id){
  var s=DATA.find(function(x){return x.id===id});if(!s)return;
  var o=uCoords?uCoords.lat+','+uCoords.lng:'',d=s.lat+','+s.lng;
  var url=o?'https://www.google.com/maps/dir/?api=1&origin='+o+'&destination='+d+'&travelmode=walking':'https://www.google.com/maps/search/?api=1&query='+d;
  window.open(url,'_blank');showToast('🗺 Opening route to '+s.name);
}
function shareS(){
  var s=DATA.find(function(x){return x.id===selId});if(!s)return;
  var url='https://www.google.com/maps/search/?api=1&query='+s.lat+','+s.lng;
  if(navigator.share)navigator.share({title:s.name,text:s.name+' — '+s.area,url:url});
  else{if(navigator.clipboard)navigator.clipboard.writeText(url);showToast('📋 Location link copied!')}
}
function resetView(){if(uCoords)map.flyTo([uCoords.lat,uCoords.lng],13);else map.flyTo([9.0192,38.7525],13)}
function toggleLayer(){
  sat=!sat;map.removeLayer(tile);
  tile=sat?L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map):L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  showToast(sat?'🛰 Satellite view':'🗺 Map view');
}
var tt;
function showToast(msg){var t=document.getElementById('toast');document.getElementById('tm').textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show')},2800)}
document.addEventListener('DOMContentLoaded',initMap);
</script>
</body>
