<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Tera — Final</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>
:root{
  --bg:#0D1117;
  --card:#161D2E;
  --text:#E2EDFF;
  --muted:#8899BB;
  --primary:#00D4AA;
}
body.light{
  --bg:#F8FAFC;
  --card:#FFFFFF;
  --text:#0F172A;
  --muted:#475569;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
}
#map{height:100vh}
header{
  position:absolute;
  top:10px;left:10px;right:10px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}
button{
  background:var(--card);
  border:none;
  padding:10px;
  border-radius:10px;
  color:var(--text);
}
#search{
  position:absolute;
  top:70px;left:10px;right:10px;
  z-index:1000;
}
#search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
}
.panel{
  position:absolute;
  bottom:0;left:0;right:0;
  background:var(--card);
  border-radius:20px 20px 0 0;
  padding:15px;
  max-height:40%;
  overflow:auto;
}
.card{
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.05);
}
</style></head>
<body><header>
<button onclick="toggleTheme()">🌗</button>
<button onclick="locate()">📍</button>
</header><div id="search">
<input id="searchInput" placeholder="Search station...">
</div><div id="map"></div><div class="panel" id="panel"></div><script>
let map = L.map('map').setView([9.03,38.74],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stations=[
 {name:'Bole Station',lat:9.03,lng:38.74},
 {name:'Piassa Station',lat:9.04,lng:38.75}
];

let markers=[];

function render(){
 markers.forEach(m=>map.removeLayer(m));
 markers=[];
 let panel=document.getElementById('panel');
 panel.innerHTML='';
 let search=document.getElementById('searchInput').value.toLowerCase();
 stations.filter(s=>s.name.toLowerCase().includes(search)).forEach(s=>{
  let m=L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.name);
  markers.push(m);

  let div=document.createElement('div');
  div.className='card';
  div.innerText=s.name;
  div.onclick=()=>map.setView([s.lat,s.lng],16);
  panel.appendChild(div);
 });
}

render();

document.getElementById('searchInput').oninput=render;

function locate(){
 navigator.geolocation.getCurrentPosition(pos=>{
  let lat=pos.coords.latitude;
  let lng=pos.coords.longitude;
  map.setView([lat,lng],15);
  L.marker([lat,lng]).addTo(map).bindPopup('You');
 });
}

function toggleTheme(){
 document.body.classList.toggle('light');
 localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');
}

(function(){
 if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
})();

if(!localStorage.getItem('intro')){
 setTimeout(()=>{
  alert('Welcome to Taxi Tera 🚀');
 },1000);
 localStorage.setItem('intro',1);
}

window.addEventListener('offline',()=>alert('Offline'));
window.addEventListener('online',()=>alert('Back online'));

</script></body>
</html>
